services:
  adguardhome:
    image: adguard/adguardhome:latest
    command:
      - --no-check-update
      - -c
      - /opt/adguardhome/conf/AdGuardHome.yaml
      - -w
      - /opt/adguardhome/work
      - --logfile
      - /var/log/adguardhome/adguardhome.log
    ports:
      # DNS server
      - "${LAN_HOST}:53:53/udp"
      - "${LAN_HOST}:53:53/tcp"
      # DHCP server
      # - 67:67/udp
      # - 68:68/udp
      # Web UI
      # - 13080:80
      # - 13443:443
      # First time setup
      # - 13000:3000
      # DNS over TLS
      # - 853:853/tcp
      # - 853:853/udp
      # DNS over QUIC
      # - 784:784/udp
      # - 8853:8853/udp
      # DNSCrypt
      # - 15443:5443/tcp
      # - 15443:5443/udp
    volumes:
      - "${DATA_ROOT}/addons/adguardhome/data/work:/opt/adguardhome/work"
      - "${DATA_ROOT}/addons/adguardhome/data/conf:/opt/adguardhome/conf"
      - ${LOG_ROOT:-/var/log}/adguardhome:/var/log/adguardhome
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.adguardhome.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 20s
