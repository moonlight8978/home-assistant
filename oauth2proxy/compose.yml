services:
  oauth2proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest-alpine
    command: --config=/etc/oauth2-proxy.cfg
    user: "${NON_ROOT_USER}"
    volumes:
      - ./oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.oauth2proxy.loadbalancer.server.port=4180
