services:
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    env_file: .env
    user: "${NON_ROOT_USER}"
    volumes:
      - "${DATA_ROOT}/addons/pocketid/data:/app/data"
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.services.pocketid.loadbalancer.server.port=1411
      - traefik.docker.network=edge
    networks:
      - edge
